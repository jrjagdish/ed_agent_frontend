server {
    listen 0.0.0.0:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend routing (React / Vite / SPA)
    location / {
        try_files $uri /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass https://edagent-production-74a4.up.railway.app/;
        proxy_http_version 1.1;

        proxy_set_header Host edagent-production-74a4.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
